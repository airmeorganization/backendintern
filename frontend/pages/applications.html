<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - Internship Engine</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar injected via JS -->

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <h1 class="text-3xl font-bold text-gray-900 mb-6" id="page-title">Applications</h1>

            <div id="loading-state" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-600"></div>
            </div>

            <div id="applications-list" class="hidden space-y-4">
                <!-- Cards injected here -->
            </div>

            <div id="empty-state" class="hidden text-center py-12 bg-white shadow rounded-lg">
                <p class="text-gray-500" id="empty-message">No applications found.</p>
            </div>
        </div>
    </main>
    <script type="module" src="/js/pages/applications.js"></script>
</body>
</html>
