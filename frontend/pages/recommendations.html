<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recommendations - Internship Engine</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar injected via JS -->

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">AI Recommendations</h1>
            <p class="text-gray-600 mb-6">Personalized internship matches powered by Cloudflare Workers AI based on your profile.</p>

            <div id="loading-state" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-indigo-600"></div>
                <p class="mt-2 text-gray-500">AI is analyzing internships for you...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-12 bg-white shadow rounded-lg">
                <h3 class="text-lg font-medium text-gray-900">No recommendations found</h3>
                <p class="mt-1 text-gray-500" id="empty-message">Please make sure your profile is fully complete with skills and domain preferences.</p>
                <div class="mt-6">
                    <a href="/pages/profile.html" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700">
                        Update Profile
                    </a>
                </div>
            </div>

            <div id="recommendations-container" class="hidden space-y-6">
                <!-- Recommendations injected here -->
            </div>
        </div>
    </main>
    <script type="module" src="/js/pages/recommendations.js"></script>
</body>
</html>
